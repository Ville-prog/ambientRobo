<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ambientRobo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="viz"></canvas>
  <main>
    <h1>ambientRobo</h1>

    <form id="prompt-form">
      <textarea
        id="prompt-input"
        placeholder="describe a sound..."
        rows="4"
      ></textarea>
      <button type="submit" id="submit-btn">generate</button>
    </form>

    <p id="error" class="error hidden"></p>
  </main>

  <div id="tuning-panel">
    <div class="tuning-toggles">
      <label class="tuning-toggle">
        <input type="checkbox" id="viz-toggle" checked>
        <span>visuals</span>
      </label>
      <label class="tuning-toggle">
        <input type="checkbox" id="tune-toggle">
        <span>adjust visual</span>
      </label>
    </div>
    <div class="tuning-row">
      <span class="tuning-label">alpha</span>
      <input type="range" id="alpha-slider" min="0" max="1" step="0.01">
      <span class="tuning-val" id="alpha-val"></span>
    </div>
    <div class="tuning-row">
      <span class="tuning-label">width</span>
      <input type="range" id="width-slider" min="0" max="5" step="0.1">
      <span class="tuning-val" id="width-val"></span>
    </div>
    <div class="tuning-row">
      <span class="tuning-label">speed</span>
      <input type="range" id="speed-slider" min="0" max="0.003" step="0.0001">
      <span class="tuning-val" id="speed-val"></span>
    </div>
  </div>

  <script src="https://unpkg.com/@strudel/web@1.0.3"></script>
  <script src="visualizer.js"></script>
  <script src="app.js"></script>
</body>
</html>
